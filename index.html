<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tileWEBapp - LSU 3ro.</title>
    <link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="main-container">
    <div class="grid-wrapper" id="grid">
		<div class="tile t1" onclick="toggleTile(this, 't1')">LSU</div>
		<div class="tile t2" onclick="toggleTile(this, 't2')">Met. INT.</div>
		<div class="tile t3" onclick="toggleTile(this, 't3')">I. Español</div>
		<div class="tile t4" onclick="toggleTile(this, 't4')">Lingüística</div>
		<div class="tile t5" onclick="toggleTile(this, 't5')">Talleres</div>
		<div class="tile t6" onclick="toggleTile(this, 't6')">Investigación</div>
		<div class="tile t7" onclick="toggleTile(this, 't7')">Prácticas</div>
		<div class="tile t8" onclick="toggleTile(this, 't8')">Horarios</div>
    </div>

	<div id="content-area" class="content-area">
        <h1 id="content-title">Título</h1>
        <hr>
        <div id="content-body" class="escritorio-grid">
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
